services:
  - type: web
    name: smart-ai-healthcare-api
    env: python
    plan: free
    # only backend dependencies; frontend can be hosted separately or after
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://yourdomain.onrender.com

databases:
  - name: healthcare-db
    engine: postgres
    version: 15
    plan: free
