services:
  - type: web
    name: smart-ai-healthcare-api
    env: python
    plan: free
    buildCommand: |
      cd app && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port 8000
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://yourdomain.onrender.com

databases:
  - name: healthcare-db
    engine: postgres
    version: 15
    plan: free
